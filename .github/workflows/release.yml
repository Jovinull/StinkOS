name: release

# Fires on every annotated tag matching v* (e.g. v0.4, v0.4.0, v1.0.0-rc1).
# Builds the OS image, packages it as stinkos-install.iso with a proper
# MBR partition table, and attaches the artifact to the matching GitHub
# release (creating one if it doesn't yet exist).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write     # required for gh release create / upload

jobs:
  build-iso:
    name: build stinkos-install.iso
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          # Need annotated tag metadata for the release-notes step below;
          # default shallow clone fetches the commit but not the tag's
          # annotation, so `git tag -l --format='%(contents)' "$TAG"`
          # would return empty and the release title falls back to the
          # commit subject.
          fetch-tags: true
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bison flex texinfo wget \
            libgmp3-dev libmpc-dev libmpfr-dev libisl-dev \
            qemu-system-x86 python3

      - name: Restore i386-elf cross-toolchain cache
        id: cache-cross
        uses: actions/cache@v4
        with:
          path: ~/opt/cross
          key: cross-toolchain-${{ hashFiles('tools/build-cross-toolchain.sh') }}-v1

      - name: Build cross-toolchain (cache miss only)
        if: steps.cache-cross.outputs.cache-hit != 'true'
        run: bash tools/build-cross-toolchain.sh

      - name: Add toolchain to PATH
        run: echo "$HOME/opt/cross/bin" >> $GITHUB_PATH

      # Rust nightly + rust-src for the v0.9 userland.
      - name: Install Rust nightly + rust-src
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Build install ISO
        run: make stinkos-install.iso

      - name: Compute SHA-256 of the artifact
        run: |
          sha256sum stinkos-install.iso | tee stinkos-install.iso.sha256

      - name: Publish GitHub release with artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF##*/}"
          # Extract annotation body via `git cat-file tag` -- skips the
          # tag header (object/type/tag/tagger lines + blank separator)
          # and returns the actual message. More reliable than the
          # `git tag -l --format='%(contents)'` path which has bitten
          # us on older fetched-but-shallow checkouts.
          RAW=$(git cat-file tag "$TAG")
          BODY=$(echo "$RAW" | sed '1,/^$/d')
          TITLE=$(echo "$BODY" | head -n 1)
          NOTES_FILE=$(mktemp)
          echo "$BODY" | tail -n +3 > "$NOTES_FILE"

          # Debug: log what we extracted so a future regression is easy
          # to spot from the workflow output without re-running locally.
          echo "::group::extracted tag annotation"
          echo "TAG=$TAG"
          echo "TITLE='$TITLE'"
          echo "BODY length=$(echo "$BODY" | wc -c)"
          echo "--- notes-file ---"
          cat "$NOTES_FILE"
          echo "::endgroup::"

          if [ ! -s "$NOTES_FILE" ]; then
            echo "StinkOS $TAG -- see CHANGELOG / commits for details." > "$NOTES_FILE"
          fi
          if [ -z "$TITLE" ]; then TITLE="$TAG"; fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" --title "$TITLE" --notes-file "$NOTES_FILE"
          fi
          gh release upload "$TAG" stinkos-install.iso stinkos-install.iso.sha256 \
            --clobber
