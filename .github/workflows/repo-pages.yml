name: repo-pages

# Publishes the sample stink-pkg repository (built by `make sample-packages`)
# to GitHub Pages so a fresh StinkOS install can install packages out of the
# box. Fires only on master pushes -- tag pushes are skipped because the
# `github-pages` deployment environment is protected to master only, and a
# tag push would just fail with "tag X is not allowed to deploy". Release
# tags still get their ISO via release.yml.
on:
  push:
    branches: [master]
  workflow_dispatch:

# Pages deploy needs `pages: write` + `id-token: write` so the official
# deploy-pages action can verify the upload through OIDC.
permissions:
  contents: read
  pages:    write
  id-token: write

# Only one Pages deploy at a time; in-flight runs get queued so the latest
# push wins.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: build sample repo and deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url:  ${{ steps.deploy.outputs.page_url }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bison flex texinfo wget \
            libgmp3-dev libmpc-dev libmpfr-dev libisl-dev \
            qemu-system-x86 python3

      - name: Restore i386-elf cross-toolchain cache
        id: cache-cross
        uses: actions/cache@v4
        with:
          path: ~/opt/cross
          key:  cross-toolchain-${{ hashFiles('tools/build-cross-toolchain.sh') }}-v1

      - name: Build cross-toolchain (cache miss only)
        if: steps.cache-cross.outputs.cache-hit != 'true'
        run: bash tools/build-cross-toolchain.sh

      - name: Add toolchain to PATH
        run: echo "$HOME/opt/cross/bin" >> $GITHUB_PATH

      - name: Build sample packages
        run: make sample-packages

      - name: Generate index.txt for the repo
        run: |
          python3 - <<'PY'
          import hashlib, os, struct
          REPO = "repo"
          HDR  = "<IHH32s16s128sIIII"
          HDR_SIZE = struct.calcsize(HDR)
          MAGIC = 0x474B5053

          def cstr(b):
              i = b.find(b"\x00")
              return (b if i < 0 else b[:i]).decode("ascii", errors="replace")

          out = []
          for fn in sorted(os.listdir(REPO)):
              if not fn.endswith(".stinkpkg"):
                  continue
              p = os.path.join(REPO, fn)
              with open(p, "rb") as f:
                  head = f.read(HDR_SIZE)
              if len(head) < HDR_SIZE: continue
              fields = struct.unpack(HDR, head)
              if fields[0] != MAGIC: continue
              name = cstr(fields[3])
              ver  = cstr(fields[4])
              h = hashlib.sha256()
              with open(p, "rb") as f:
                  for chunk in iter(lambda: f.read(65536), b""):
                      h.update(chunk)
              out.append(f"{name} {ver} {h.hexdigest()}\n")

          with open(os.path.join(REPO, "index.txt"), "w") as f:
              f.writelines(out)
          PY

      - name: Lay out Pages artifact
        run: |
          mkdir -p _pages/pkg _pages/images
          # Static landing + stylesheet (authored under pages/ in the repo).
          cp pages/index.html _pages/index.html
          cp pages/style.css  _pages/style.css
          # Screenshots live at images/ in the repo so README on GitHub and
          # the Pages site share the same source. Both reference images/foo.png.
          cp images/*.png     _pages/images/ 2>/dev/null || true
          # Package binaries + plain manifest the stink-pkg client consumes.
          cp repo/*.stinkpkg  _pages/pkg/
          cp repo/index.txt   _pages/index.txt
          # Human-readable browse-able package index. Generated from index.txt
          # so the table here cannot drift from what the client downloads.
          python3 - <<'PY'
          import os
          rows = []
          with open("_pages/index.txt") as f:
              for line in f:
                  parts = line.strip().split()
                  if len(parts) != 3: continue
                  name, ver, sha = parts
                  size = os.path.getsize(f"_pages/pkg/{name}.stinkpkg") if os.path.exists(f"_pages/pkg/{name}.stinkpkg") else 0
                  rows.append((name, ver, sha, size))

          rows_html = []
          for name, ver, sha, size in rows:
              kib = f"{size/1024:.1f} KiB" if size else "-"
              short = sha[:12] + "..." if len(sha) > 12 else sha
              rows_html.append(
                  f'<tr><td><a href="pkg/{name}.stinkpkg">{name}.stinkpkg</a></td>'
                  f'<td>{ver}</td><td>{kib}</td>'
                  f'<td class="sha" title="{sha}">{short}</td></tr>'
              )
          rows_str = "\n".join(rows_html)
          html = (
              '<!DOCTYPE html><html lang="en"><head>'
              '<meta charset="utf-8">'
              '<meta name="viewport" content="width=device-width,initial-scale=1">'
              '<title>StinkOS package repository</title>'
              '<link rel="stylesheet" href="../style.css">'
              '</head><body>'
              '<section><div class="wrap">'
              '<p><a href="../">&larr; StinkOS</a></p>'
              '<h2>Package repository</h2>'
              '<p>Live manifest at <a href="../index.txt">index.txt</a>. '
              'Point a StinkOS install at this URL via <code>STINKPKG.CONF</code>:</p>'
              '<pre>repo_url=https://jovinull.github.io/StinkOS</pre>'
              '<table class="pkg">'
              '<thead><tr><th>File</th><th>Version</th><th>Size</th><th>SHA-256</th></tr></thead>'
              f'<tbody>{rows_str}</tbody>'
              '</table>'
              f'<p style="color:var(--fg-muted);font-size:0.85rem;margin-top:24px">{len(rows)} packages</p>'
              '</div></section></body></html>'
          )
          with open("_pages/pkg/index.html", "w") as f:
              f.write(html)
          PY

      # enablement: true auto-creates the Pages site on first run so the
      # repo owner doesn't have to flip Settings -> Pages -> Source by hand.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _pages

      - name: Deploy to GitHub Pages
        id:   deploy
        uses: actions/deploy-pages@v4
