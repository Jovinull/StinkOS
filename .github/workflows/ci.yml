name: CI

on:
  pull_request:
  push:                       # every branch, so feature branches get build feedback
                              # before they hit a PR. Master is included implicitly.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  test-headless:
    name: test-headless
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bison flex texinfo wget \
            libgmp3-dev libmpc-dev libmpfr-dev libisl-dev \
            qemu-system-x86 python3 \
            cppcheck

      - name: Restore i386-elf cross-toolchain cache
        id: cache-cross
        uses: actions/cache@v4
        with:
          path: ~/opt/cross
          key: cross-toolchain-${{ hashFiles('tools/build-cross-toolchain.sh') }}-v1

      - name: Build cross-toolchain (cache miss only)
        if: steps.cache-cross.outputs.cache-hit != 'true'
        run: bash tools/build-cross-toolchain.sh

      - name: Add toolchain to PATH
        run: echo "$HOME/opt/cross/bin" >> $GITHUB_PATH

      - name: Verify toolchain
        run: |
          i386-elf-gcc --version | head -1
          i386-elf-as --version | head -1
          i386-elf-ld --version | head -1

      # Rust nightly + rust-src for the v0.9 userland (cargo build-std
      # needs core/alloc compiled from source for the i686-stinkos
      # bare-metal target).
      - name: Install Rust nightly + rust-src
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Build OS image
        run: make

      - name: Run host-side unit tests
        run: make unittest

      - name: Run headless boot test
        run: make test-headless

      # Dedicated smokes split out of test-headless: each spins its
      # own QEMU instance + asserts a single feature end-to-end.
      # Cheaper per-assertion than the menu sweep, less prone to
      # timing flake on slow CI runners.
      - name: Smoke -- multi-proc fork+exec
        run: make smoke-multiproc

      - name: Smoke -- ACPI S5 shutdown
        run: make smoke-acpi

      - name: Smoke -- COW fork
        run: make smoke-cow

      - name: Smoke -- VFS multi-mount
        run: make smoke-vfs-mounts

      - name: Smoke -- W^X .data execution blocked
        run: make smoke-wxattack

      - name: Smoke -- exit codes through sys_wait
        run: make smoke-exitcode

      - name: Smoke -- Rust hello (toolchain)
        run: make smoke-rs-hello

      - name: Smoke -- Rust alloc crate
        run: make smoke-rs-alloc

      - name: Smoke -- Rust stdio shim
        run: make smoke-rs-stdio

      - name: Smoke -- Rust JSON parser
        run: make smoke-rs-json

      - name: Smoke -- Rust Conway's Life
        run: make smoke-rs-life

      - name: Static-analysis sweep
        run: make audit
        continue-on-error: true   # surface findings without failing the build yet
